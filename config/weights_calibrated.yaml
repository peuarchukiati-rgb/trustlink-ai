# Data-calibrated dimension weights (#5).
# LEARNED from the synthetic ground-truth by an interpretable logistic model (seed 42), then
# rounded to integers with a small regulatory FLOOR on identity (a KYC/fraud dimension should
# never be literally ignored). Selected with `trustlink.validation.calibrate`.
#
# This is the "why 742? the data says so" mode: fed outcomes, the engine LEARNS the weights and
# keeps the same explainable additive form. On synthetic data it lands Ms. Aom at ~739 — within a
# whisker of the hand-set 742, i.e. the data essentially confirms the expert weights.
#
# Hand-set weights remain the DEFAULT (config/weights.yaml). This file is opt-in via the
# "calibrated" mode so the canonical 742 demo is untouched.
weights_version: "calibrated-1.0.0"

weights:
  income_stability: 16      # data: 16%   (hand 25)
  payment_discipline: 36    # data: 37%   (hand 20)  <- data says payment reliability matters most
  savings_behaviour: 11     # data: 11%   (hand 15)
  financial_trend: 25       # data: 26%   (hand 15)  <- and trend matters far more than we guessed
  lifestyle_stability: 10   # data: 11%   (hand 10)
  identity_trust: 2         # data:  0% + regulatory floor (hand 10)

tiers:
  strong_min: 720
  moderate_min: 600

confidence:
  breadth_weight: 0.40
